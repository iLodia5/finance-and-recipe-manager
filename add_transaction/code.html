</div>

<section class="bg-surface-container-lowest rounded-xl shadow-warm-lg p-stack-lg pt-12 relative z-10">
<!-- Header -->
<header class="flex justify-between items-center mb-stack-lg">
<div class="w-8"></div> <!-- Spacer for centering -->
<h1 class="font-headline-md text-headline-md text-on-surface text-center">New Transaction</h1>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 20px;">close</span>
</button>
</header>
<!-- Form Content -->
<div class="flex flex-col gap-stack-md">
<!-- Type Toggle (Expense / Income) -->
<div class="bg-surface-container rounded-full p-unit flex gap-1">
<button class="flex-1 py-3 rounded-full bg-surface-container-lowest shadow-sm font-label-sm text-label-sm text-primary flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_outward</span>
                        Outcome
                    </button>
<button class="flex-1 py-3 rounded-full text-on-surface-variant hover:text-on-surface font-label-sm text-label-sm flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined" style="font-size: 18px;">south_west</span>
                        Income
                    </button>
</div>
<!-- Item Name Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface ml-unit" for="item-name">Item Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary opacity-50" style="font-size: 24px;">shopping_bag</span>
<input class="w-full bg-surface-container-low text-on-surface font-body-lg text-body-lg rounded-lg pl-12 pr-4 py-4 border-2 border-transparent focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder-on-surface-variant/40" id="item-name" placeholder="What did you buy?" type="text"/>
</div>
</div>

<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-on-surface ml-unit" for="amount">Amount</label>
<div class="relative flex items-center">
<span class="absolute left-5 font-headline-md text-headline-md text-primary">$</span>
<input class="w-full bg-surface-container-low text-on-surface font-headline-lg text-headline-lg rounded-lg pl-12 pr-4 py-5 border-2 border-transparent focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder-on-surface-variant/30 text-right" id="amount" placeholder="0.00" type="number"/>
</div>
</div>

<label class="font-label-sm text-label-sm text-on-surface ml-unit">When did this happen?</label>

<button class="flex-1 bg-primary-container text-on-primary-container border-2 border-primary-container rounded-lg py-4 flex flex-col items-center justify-center gap-2 transition-transform hover:scale-95 active:scale-90">

<span class="font-label-sm text-label-sm">Today</span>
</button>
<!-- Custom (Inactive) -->
<button class="flex-1 bg-surface-container-low text-on-surface-variant border-2 border-transparent hover:border-outline-variant rounded-lg py-4 flex flex-col items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined" style="font-size: 28px;">calendar_month</span>
<span class="font-label-sm text-label-sm">Custom</span>
</button>
</div>
</div>
</div>
