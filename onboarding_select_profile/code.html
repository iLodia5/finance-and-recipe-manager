<style>
        .warm-shadow-sm { box-shadow: 0 4px 12px rgba(93, 64, 55, 0.08); }
        .warm-shadow-md { box-shadow: 0 8px 24px rgba(93, 64, 55, 0.12); }
        .warm-shadow-lg { box-shadow: 0 12px 32px rgba(93, 64, 55, 0.16); }
        .button-press { border-bottom: 3px solid rgba(0,0,0,0.15); transition: transform 0.1s, border-bottom-width 0.1s; }
        .button-press:active { transform: translateY(2px); border-bottom-width: 1px; margin-bottom: 2px; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(93, 64, 55, 0.12); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Container -->
<main class="flex-1 flex flex-col items-center justify-center p-container-padding max-w-md mx-auto w-full relative z-10">
<!-- Header Section -->
<header class="text-center mb-stack-lg w-full flex flex-col items-center">
<!-- Mascot Image -->
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest warm-shadow-md mb-stack-md bg-surface-variant flex items-center justify-center">
<img alt="Cute friendly bear mascot" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoQ4P-Dw2a2BSy14uc3h2NBiJz65G7rMmUH6jEXxMge8AZGgUkcGr7XfIiA4EdD567Ojg3dpt9Bl3DsknqB1Zk79i9R53QeKKzJbjR35JinMYqvwLyEpsLkX0jRdfcSFmCnis1ztT3wA2-qAykLCR8ot2ANwh9Re9BjddR88S0OxzHw70WgH1hMh3CioLFCv_IQZSzg6qvds3wKgH148n_OsofHn-TbkiY89CRXpcOAXqXQCLAMziapkJiDVKO2GAInenn_LiB8AIn"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm tracking-tight">Welcome back!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Who's tracking today?</p>
</header>
<!-- Profiles List -->
<div class="w-full space-y-stack-md mb-stack-lg">
<!-- Profile 1 -->
<button class="w-full flex items-center p-stack-md bg-surface-container-lowest rounded-xl warm-shadow-sm card-hover border-2 border-transparent hover:border-primary-fixed group text-left transition-colors">
<div class="w-14 h-14 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center mr-gutter flex-shrink-0">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-[20px] text-on-surface mb-1">Personal Journal</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Last updated today</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Profile 2 -->
<button class="w-full flex items-center p-stack-md bg-surface-container-lowest rounded-xl warm-shadow-sm card-hover border-2 border-transparent hover:border-primary-fixed group text-left transition-colors">
<div class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mr-gutter flex-shrink-0">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-[20px] text-on-surface mb-1">Family Budget</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Last updated yesterday</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Profile 3 -->
<button class="w-full flex items-center p-stack-md bg-surface-container-lowest rounded-xl warm-shadow-sm card-hover border-2 border-transparent hover:border-primary-fixed group text-left transition-colors">
<div class="w-14 h-14 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center mr-gutter flex-shrink-0">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-[20px] text-on-surface mb-1">Work Expenses</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Last updated 3 days ago</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</div>
<!-- Add New Profile Action -->
<button class="w-full flex items-center justify-center p-stack-md bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant hover:border-primary text-primary hover:bg-surface-container transition-colors button-press warm-shadow-sm font-label-sm text-label-sm">
<span class="material-symbols-outlined mr-unit">add</span>
            Add New Profile
        </button>
</main>
