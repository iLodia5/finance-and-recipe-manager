<style>
        /* Custom styles to handle specific tactile UI needs without writing arbitrary classes */
        .warm-shadow-card {
            box-shadow: 0 12px 32px rgba(93, 64, 55, 0.08);
        }
        .warm-shadow-btn {
            box-shadow: 0 8px 16px rgba(93, 64, 55, 0.12);
        }
        .chunky-btn {
            border-bottom-width: 4px;
        }
        .chunky-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
            margin-top: 2px;
        }
        .input-tactile:focus {
            box-shadow: 0 0 0 2px var(--tw-colors-primary-container);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-container-padding font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- 
        Navigation Shells (TopAppBar & BottomNavBar) are intentionally excluded here.
        Reason: This is a linear/transactional onboarding screen ("Profile Creation").
        The user is in a focused journey and should not have global navigation options until the profile is created.
    -->
<main class="w-full max-w-md relative flex flex-col items-center">
<!-- Mascot Peeking Element -->
<div class="w-28 h-28 mb-[-32px] relative z-10 rounded-full overflow-hidden border-4 border-surface shadow-sm">
<img alt="Friendly Mascot" class="w-full h-full object-cover object-top" data-alt="A cute, soft, round stylized illustrated bear mascot face looking cheerfully straight ahead. The illustration style is flat, vector-based, and highly tactile, resembling modern stationery design. The color palette features warm creams, soft oranges, and gentle earth tones, sitting against a clean, warm #fff8f6 background. The mood is friendly, inviting, and cozy, perfectly embodying an 'Emotional Finance' aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2NRuNPf2-4ec1yrGcfUqjNe844SnoCFEzydbxQWfOYkLP6cBZTFiD9TWqd8Vyhb-iHWLPP8KvbzHRa4FBEXrTtr-7ArYYP-FXYUOazBJeK0-TmKkrcO89E2Uc3tzF5WmOzWfGjSiGruF-1YcVt5eOuQGOyQ9u4FjzZgdyggbGhdia8bufE_piENHQ2KDP2A1UmAG6f4RTzwJfug1JT-KwKGo0scIZhicbguzn9-bRTHd42wg7oERTnqchVnih_kRfHLGDJ4vvkmCD"/>
</div>
<!-- Main Card Canvas -->
<div class="bg-surface w-full rounded-xl p-container-padding pt-[48px] warm-shadow-card relative z-20 flex flex-col items-center text-center border border-surface-container-high">
<h1 class="font-headline-lg text-headline-lg text-primary mb-unit">Create Your Profile</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-[280px]">
                Enter your profile name <br/> <span class="opacity-80 text-[14px]">(e.g., Personal, Job, or Company)</span>
</p>
<form action="#" class="w-full flex flex-col items-center" method="POST" onsubmit="event.preventDefault();">
<div class="w-full relative mb-stack-lg group">
<input autocomplete="off" class="input-tactile w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary rounded-lg py-4 px-6 font-headline-md text-headline-md text-center text-on-surface placeholder:text-outline-variant transition-all outline-none" id="profileName" name="profileName" placeholder="My Journal" type="text"/>
</div>
<button class="chunky-btn warm-shadow-btn w-full bg-primary text-on-primary font-label-sm text-label-sm py-4 rounded-full border-on-primary-fixed-variant hover:bg-surface-tint transition-all flex items-center justify-center gap-2" type="submit">
                    Let's Start
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 18px;">arrow_forward</span>
</button>
</form>
</div>
<!-- Decorative subtle element below card for visual balance -->
<div class="mt-stack-lg text-on-surface-variant opacity-60 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-label-sm text-label-sm">Your data is stored securely</span>
</div>
</main>
</body></html>
